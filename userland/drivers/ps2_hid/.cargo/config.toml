[unstable]
# Driver Runtime: Rebuilding core and alloc is necessary for drivers to 
# utilize dynamic memory allocation through the 'libstardust' allocator.
build-std = ["core", "compiler_builtins", "alloc"]

[build]
# Target Consistency: Drivers use the same bare-metal target as the kernel 
# but run in a different protection ring.
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
rustflags = [
    # Linker Script: Positions the driver binary in the correct virtual address space.
    "-C", "link-arg=-Tlinker.ld",
    
    # Static Linking: Drivers are self-contained to avoid dependencies on external loaders.
    "-C", "relocation-model=static"
]
